<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting | TalabaUy</title>
    <meta http-equiv="refresh" content="0; url=./#details">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <p>Redirecting to <a href="./#details">Property Details</a>...</p>
    <script>
      (function () {
        var target = "./" + window.location.search + "#details";
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
